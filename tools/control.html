<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Điều khiển CountAPI</title>
</head>
<body>
    <h1>Điều khiển</h1>
    <div>
        <button id="btnSet0" style="font-size: 2rem; padding: 8px 12px; margin-right: 20px;">Trả về 0</button>
        <button id="btnSet1" style="font-size: 2rem; padding: 8px 12px; margin-right: 20px;">Tắt máy (1)</button>
        <button id="btnSet2" style="font-size: 2rem; padding: 8px 12px;">Reset máy (2)</button>
    </div>
    <div id="dataDisplay" style="margin-top: 20px; font-family: monospace;">
        Đang tải dữ liệu...
    </div>
    <script>
        // Định nghĩa các URL API
        const GET_URL = "https://countapi.mileshilliard.com/api/v1/get/nvhuy";
        const SET_BASE_URL = "https://countapi.mileshilliard.com/api/v1/set/nvhuy";
        
        // Hàm lấy dữ liệu từ GET và hiển thị lên màn hình
        async function fetchAndDisplayData() {
            const displayDiv = document.getElementById("dataDisplay");
            displayDiv.innerHTML = "Đang tải dữ liệu...";
            
            try {
                const response = await fetch(GET_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                // Hiển thị giá trị hiện tại
                let prettyJson = JSON.stringify(data, null, 2);
                
                displayDiv.innerHTML = `
                    <strong>JSON:</strong><br>
                    <pre style="background:#f4f4f4; padding:8px; border-radius:4px;">${prettyJson}</pre>
                `;
            } catch (error) {
                console.error("Lỗi khi fetch GET:", error);
                displayDiv.innerHTML = `❌ Lỗi khi tải dữ liệu: ${error.message}<br>Vui lòng kiểm tra kết nối hoặc thử lại.`;
            }
        }
        
        // Hàm gửi GET request để set giá trị
        async function setValueRequest(value, actionName) {
            try {
                const response = await fetch(`${SET_BASE_URL}?value=${value}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                // Sau khi set thành công, cập nhật lại dữ liệu
                await fetchAndDisplayData();
                return true;
            } catch (error) {
                console.error(`Lỗi khi set value (${actionName}):`, error);
                const displayDiv = document.getElementById("dataDisplay");
                displayDiv.innerHTML = `❌ Lỗi khi thực hiện "${actionName}": ${error.message}<br>Không thể cập nhật trạng thái.`;
                return false;
            }
        }
        
        // Hành động Trả về 0 (Set 0)
        async function set0() {
            await setValueRequest(0, "Trả về 0");
        }
        
        // Hành động Tắt máy (Set 1)
        async function set1() {
            await setValueRequest(1, "Tắt máy");
        }
        
        // Hành động Reset máy (Set 2)
        async function set2() {
            await setValueRequest(2, "Reset máy");
        }
        
        // Gán sự kiện cho các nút khi DOM đã sẵn sàng
        window.addEventListener("DOMContentLoaded", () => {
            // Nạp dữ liệu ban đầu
            fetchAndDisplayData();
            
            // Gắn sự kiện click cho nút Trả về 0
            const btn0 = document.getElementById("btnSet0");
            if (btn0) {
                btn0.addEventListener("click", set0);
            }
            
            // Gắn sự kiện click cho nút Tắt máy
            const btn1 = document.getElementById("btnSet1");
            if (btn1) {
                btn1.addEventListener("click", set1);
            }
            
            // Gắn sự kiện click cho nút Reset máy
            const btn2 = document.getElementById("btnSet2");
            if (btn2) {
                btn2.addEventListener("click", set2);
            }
        });
    </script>
</body>
</html>
